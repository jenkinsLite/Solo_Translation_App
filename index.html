<!doctype html>
<html>
    <head>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders:opsz,wght@10..72,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <header>
            <div class="logo"></div>
            <div class="head-container">
                <h1>PollyGlot</h1>
                <h2>Perfect Translation Every Time</h2>
            </div>
        </header>
        <main>
            <div class="border">
                <p>Text to translate &#x1F447;</p>
                <textarea type="text" class="input-txt"></textarea>
                <p>Select language &#x1F447;</p>
                <div class="language-container">
                    <div class="language">
                        <input name="language" type="radio" value="French" checked>
                        <label for="French">French</label>
                        <img class="flag" src="/fr-flag.png">
                    </div>
                    <div class="language">
                        <input name="language" type="radio" value="Spanish">
                        <label for="Spanish">Spanish</label>
                        <img class="flag" src="/sp-flag.png">
                    </div>
                    <div class="language">
                        <input name="language" type="radio" value="Japanese">
                        <label for="Japanes">Japanese</label>
                        <img class="flag" src="/jpn-flag.png">
                    </div>
                </div>
                <button class="translate-btn">Translate</button>
            </div>
        </main>
        <script src="index.js" type="module"></script>
    </body>
</html>
